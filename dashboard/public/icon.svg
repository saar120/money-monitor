<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#132040"/>
      <stop offset="45%" stop-color="#1b3058"/>
      <stop offset="100%" stop-color="#284370"/>
    </linearGradient>

    <!-- Clip to icon shape -->
    <clipPath id="icon-clip">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>

    <!-- Bar gradients - progressively brighter green -->
    <linearGradient id="bar1" x1="317" y1="740" x2="317" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a7a52"/>
      <stop offset="100%" stop-color="#36b87a"/>
    </linearGradient>
    <linearGradient id="bar2" x1="437" y1="740" x2="437" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e8c5c"/>
      <stop offset="100%" stop-color="#42c88c"/>
    </linearGradient>
    <linearGradient id="bar3" x1="557" y1="740" x2="557" y2="375" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#24a06a"/>
      <stop offset="100%" stop-color="#56d8a0"/>
    </linearGradient>
    <linearGradient id="bar4" x1="677" y1="740" x2="677" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ab478"/>
      <stop offset="100%" stop-color="#6aeab4"/>
    </linearGradient>

    <!-- Shine overlay for bars -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Dollar sign gradient -->
    <linearGradient id="dollar" x1="707" y1="170" x2="707" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b8f4d8"/>
      <stop offset="100%" stop-color="#5cd8a0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Clipped content -->
  <g clip-path="url(#icon-clip)">
    <!-- Subtle wave/aurora accent -->
    <path d="M0,700 C180,600 360,670 512,630 C664,590 840,520 1024,560 L1024,1024 L0,1024 Z"
          fill="#2a5580" opacity="0.22"/>
    <path d="M0,780 C200,720 400,760 512,740 C624,720 824,680 1024,720 L1024,1024 L0,1024 Z"
          fill="#1e4060" opacity="0.18"/>
  </g>

  <!-- Subtle border -->
  <rect x="3" y="3" width="1018" height="1018" rx="225" ry="225"
        fill="none" stroke="#6080a8" stroke-width="3" stroke-opacity="0.3"/>

  <!-- Base platform line -->
  <line x1="235" y1="744" x2="790" y2="744"
        stroke="#4878a0" stroke-width="6" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Bar 1 (shortest) -->
  <rect x="267" y="590" width="100" height="150" rx="12" fill="url(#bar1)"/>
  <rect x="267" y="590" width="50" height="150" rx="12" fill="url(#shine)"/>

  <!-- Bar 2 -->
  <rect x="387" y="475" width="100" height="265" rx="12" fill="url(#bar2)"/>
  <rect x="387" y="475" width="50" height="265" rx="12" fill="url(#shine)"/>

  <!-- Bar 3 -->
  <rect x="507" y="375" width="100" height="365" rx="12" fill="url(#bar3)"/>
  <rect x="507" y="375" width="50" height="365" rx="12" fill="url(#shine)"/>

  <!-- Bar 4 (tallest) -->
  <rect x="627" y="280" width="100" height="460" rx="12" fill="url(#bar4)"/>
  <rect x="627" y="280" width="50" height="460" rx="12" fill="url(#shine)"/>

  <!-- Dollar sign above tallest bar -->
  <text x="677" y="268" text-anchor="middle"
        font-family="'SF Pro Display', '-apple-system', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="130" fill="url(#dollar)">$</text>
</svg>
